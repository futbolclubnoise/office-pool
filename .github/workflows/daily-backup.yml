name: Daily Firebase Backup

on:
  schedule:
    # Every day at 12:00 PM UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # also allows manual trigger from GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Firebase data and save backup
        run: |
          node - <<'EOF'
          const https = require('https');
          const fs   = require('fs');

          const PROJECT  = 'cfl-office-pool';
          const API_KEY  = 'AIzaSyAmsEX2VJRytF9Sw8NOySPD80K9gzv6hRc';
          const BASE_URL = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents/cfl`;

          function get(url) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  if (res.statusCode !== 200) {
                    reject(new Error(`HTTP ${res.statusCode}: ${data}`));
                  } else {
                    resolve(JSON.parse(data));
                  }
                });
              }).on('error', reject);
            });
          }

          // Convert Firestore typed value → plain JS value
          function fromFirestore(val) {
            if (!val) return null;
            if ('stringValue'  in val) return val.stringValue;
            if ('integerValue' in val) return Number(val.integerValue);
            if ('doubleValue'  in val) return val.doubleValue;
            if ('booleanValue' in val) return val.booleanValue;
            if ('nullValue'    in val) return null;
            if ('arrayValue'   in val) return (val.arrayValue.values || []).map(fromFirestore);
            if ('mapValue'     in val) {
              const obj = {};
              for (const [k, v] of Object.entries(val.mapValue.fields || {})) obj[k] = fromFirestore(v);
              return obj;
            }
            return null;
          }

          function parseDoc(doc) {
            const out = {};
            for (const [k, v] of Object.entries(doc.fields || {})) out[k] = fromFirestore(v);
            return out;
          }

          async function backup() {
            const now     = new Date();
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toISOString().replace('T',' ').split('.')[0] + ' UTC';
            console.log(`Starting backup ${dateStr}...`);

            // Fetch cfl/data (pollas, matches, specials, settings, banners…)
            const dataRaw  = await get(`${BASE_URL}/data?key=${API_KEY}`);
            const data     = parseDoc(dataRaw);

            // Fetch cfl/users (chunk 0)
            let users = [];
            try {
              const usersRaw = await get(`${BASE_URL}/users?key=${API_KEY}`);
              const usersDoc = parseDoc(usersRaw);
              users = usersDoc.users || [];
            } catch(e) { console.warn('users chunk 0 not found:', e.message); }

            // Fetch extra user chunks if any
            const numChunks = data.userChunks || 1;
            for (let i = 1; i < numChunks; i++) {
              try {
                const chunkRaw = await get(`${BASE_URL}/users_${i}?key=${API_KEY}`);
                const chunkDoc = parseDoc(chunkRaw);
                users = users.concat(chunkDoc.users || []);
              } catch(e) { console.warn(`chunk ${i} error:`, e.message); }
            }

            // Strip base64 photos to keep backup small
            const usersClean = users.map(u => { const {photo, ...rest} = u; return rest; });

            const result = {
              _backupDate   : dateStr,
              _backupTime   : timeStr,
              _totalUsers   : usersClean.length,
              _totalPollas  : (data.pollas  || []).length,
              _totalMatches : (data.matches || []).length,
              _totalSpecials: (data.specials|| []).length,
              pollas        : data.pollas        || [],
              matches       : data.matches       || [],
              specials      : data.specials      || [],
              bonusQuestions: data.bonusQuestions|| [],
              banners       : data.banners       || {},
              settings      : data.settings      || {},
              nid           : data.nid           || {},
              users         : usersClean
            };

            if (!fs.existsSync('backups')) fs.mkdirSync('backups');
            fs.writeFileSync(`backups/backup-${dateStr}.json`, JSON.stringify(result, null, 2));
            fs.writeFileSync('backups/latest.json',            JSON.stringify(result, null, 2));

            console.log(`✅ Backup done: ${usersClean.length} users, ${(data.pollas||[]).length} pollas, ${(data.matches||[]).length} matches, ${(data.specials||[]).length} specials`);
          }

          backup().catch(e => { console.error('❌', e.message); process.exit(1); });
          EOF

      - name: Keep only last 30 backups
        run: |
          cd backups
          ls backup-*.json 2>/dev/null | sort | head -n -30 | xargs rm -f || true
          echo "Backups retained: $(ls backup-*.json 2>/dev/null | wc -l | tr -d ' ')"

      - name: Detect anomalies and alert
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const today = require('./backups/latest.json');

          // Find yesterday's backup
          const files = fs.readdirSync('backups')
            .filter(f => f.startsWith('backup-') && f.endsWith('.json'))
            .sort();

          if (files.length < 2) { console.log('No previous backup to compare'); process.exit(0); }

          const yesterday = JSON.parse(fs.readFileSync('backups/' + files[files.length - 2]));

          const alerts = [];

          // Users deleted?
          const lost = yesterday._totalUsers - today._totalUsers;
          if (lost > 0) alerts.push(`🚨 ${lost} user(s) DELETED (${yesterday._totalUsers} → ${today._totalUsers})`);

          // Pollas deleted?
          const lostP = yesterday._totalPollas - today._totalPollas;
          if (lostP > 0) alerts.push(`🚨 ${lostP} polla(s) DELETED (${yesterday._totalPollas} → ${today._totalPollas})`);

          // Matches deleted in bulk?
          const lostM = yesterday._totalMatches - today._totalMatches;
          if (lostM > 10) alerts.push(`🚨 ${lostM} matches DELETED (${yesterday._totalMatches} → ${today._totalMatches})`);

          // Specials deleted?
          const lostS = yesterday._totalSpecials - today._totalSpecials;
          if (lostS > 0) alerts.push(`🚨 ${lostS} special(s) DELETED (${yesterday._totalSpecials} → ${today._totalSpecials})`);

          // All data wiped?
          if (today._totalUsers === 0 && yesterday._totalUsers > 0)
            alerts.push('🔴 CRITICAL: ALL USERS WIPED!');

          if (alerts.length > 0) {
            console.log('⚠️  ANOMALIES DETECTED:\n' + alerts.join('\n'));
            fs.writeFileSync('backups/.alert', alerts.join('\n'));
            process.exit(1); // fail the job → GitHub sends email notification
          } else {
            console.log('✅ No anomalies. Users:', today._totalUsers, '| Pollas:', today._totalPollas, '| Matches:', today._totalMatches);
          }
          EOF

      - name: Commit backup
        run: |
          git config user.name  "CFL Backup Bot"
          git config user.email "backup@cfl-office-pool"
          git add backups/
          git diff --staged --quiet || git commit -m "🗄️ Backup $(date -u '+%Y-%m-%d') — $(node -e "const f=require('./backups/latest.json');console.log(f._totalUsers+' users, '+f._totalPollas+' pollas')")"
          git push
